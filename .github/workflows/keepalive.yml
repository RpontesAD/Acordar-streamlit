name: Keep Sites Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App (Python)
        run: |
          python - << 'EOF'
          import requests
      
          url = "https://forminclusaocolaboraores-ewnykkvf9vn9b8qpvdpdyr.streamlit.app/"
      
          try:
              r = requests.get(
                  url,
                  headers={"User-Agent": "Mozilla/5.0"},
                  timeout=30,
                  allow_redirects=True,
              )
              print("Status:", r.status_code)
          except Exception as e:
              print("Erro:", e)
              raise
          EOF
